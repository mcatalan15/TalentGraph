name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint:
    name: Lint (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # do not stop if one test fails
      matrix:
        app:
          - api
          - client
          # - postgresql

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: containers/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: containers/${{ matrix.app }}
        run: npm ci

      - name: Run ESLint
        working-directory: containers/${{ matrix.app }}
        run: npm run lint

  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        app:
          - api
          - client
          # - postgresql
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}

  smart-contracts:
    name: Test smart contracts
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        app:
          - api
          - client
          # - postgresql
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: containers/${{ matrix.app }}
        run: npm ci

      - name: Test smart contracts
        working-directory: containers/${{ matrix.app }}
        run: npm run test:contracts
